name: intellify_worx
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/Logo-rec.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/Logo-rec.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
